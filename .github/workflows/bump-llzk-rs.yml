name: Bump llzk-rs flake input

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: bump-llzk-rs
  cancel-in-progress: true

jobs:
  bump-llzk-rs:
    runs-on: ubuntu-latest

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.LLZK_APP_ID }}
          private-key: ${{ secrets.LLZK_APP_PRIVATE_KEY }}
          owner: project-llzk
          repositories: llzk-rs

      - name: Find existing open bump PR
        id: existing-pr
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          PR_NUMBER=$(gh pr list \
            --repo project-llzk/llzk-rs \
            --state open \
            --search 'in:title "chore: bump llzk-lib flake input"' \
            --json number,headRefName \
            --jq 'map(select(.headRefName == "bot/bump-llzk-lib")) | .[0].number // empty')

          HEAD_REF=$(gh pr list \
            --repo project-llzk/llzk-rs \
            --state open \
            --search 'in:title "chore: bump llzk-lib flake input"' \
            --json number,headRefName \
            --jq 'map(select(.headRefName == "bot/bump-llzk-lib")) | .[0].headRefName // empty')

          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "head_ref=$HEAD_REF" >> "$GITHUB_OUTPUT"

      - name: Check out llzk-rs main
        if: steps.existing-pr.outputs.pr_number == ''
        uses: actions/checkout@v6
        with:
          repository: project-llzk/llzk-rs
          token: ${{ steps.app-token.outputs.token }}
          ref: main
          path: llzk-rs
          fetch-depth: 0

      - name: Check out existing PR branch
        if: steps.existing-pr.outputs.pr_number != ''
        uses: actions/checkout@v6
        with:
          repository: project-llzk/llzk-rs
          token: ${{ steps.app-token.outputs.token }}
          ref: ${{ steps.existing-pr.outputs.head_ref }}
          path: llzk-rs
          fetch-depth: 0

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        working-directory: llzk-rs
        run: |
          git config user.name "project-llzk[bot]"
          git config user.email "project-llzk[bot]@users.noreply.github.com"

      - name: Create bump branch if needed
        if: steps.existing-pr.outputs.pr_number == ''
        working-directory: llzk-rs
        run: |
          git checkout -b bot/bump-llzk-lib

      - name: Update llzk-lib flake input
        id: update
        working-directory: llzk-rs
        run: |
          nix flake lock --update-input llzk-lib
          if git diff --quiet -- flake.lock; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit changes
        if: steps.update.outputs.changed == 'true'
        working-directory: llzk-rs
        run: |
          git add flake.lock
          git commit -m "chore: bump llzk-lib flake input to ${{ github.sha }}"

      - name: Push branch
        if: steps.update.outputs.changed == 'true'
        working-directory: llzk-rs
        run: |
          git push origin HEAD:bot/bump-llzk-lib

      - name: Create PR
        if: steps.update.outputs.changed == 'true' && steps.existing-pr.outputs.pr_number == ''
        id: cpr
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          PR_URL=$(gh pr create \
            --repo project-llzk/llzk-rs \
            --base main \
            --head bot/bump-llzk-lib \
            --title "chore: bump llzk-lib flake input" \
            --body "$(cat <<EOF
          Automated flake input update triggered by a push to \`project-llzk/llzk-lib@main\`.

          Source commit: \`${{ github.sha }}\`
          Source workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          Auto-merge is enabled and will complete once required approval and CI checks pass.
          EOF
          )")
          echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"

      - name: Request core dev review on new PR
        if: steps.update.outputs.changed == 'true' && steps.existing-pr.outputs.pr_number == ''
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh pr edit bot/bump-llzk-lib \
            --repo project-llzk/llzk-rs \
            --add-reviewer project-llzk/core-devs

      - name: Enable auto-merge on new PR
        if: steps.update.outputs.changed == 'true' && steps.existing-pr.outputs.pr_number == ''
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh pr merge bot/bump-llzk-lib \
            --repo project-llzk/llzk-rs \
            --auto \
            --squash

      - name: Comment on existing PR update
        if: steps.update.outputs.changed == 'true' && steps.existing-pr.outputs.pr_number != ''
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ steps.existing-pr.outputs.pr_number }}
        run: |
          gh pr comment "$PR_NUMBER" \
            --repo project-llzk/llzk-rs \
            --body "Updated this PR with a new \`llzk-lib\` bump from \`${{ github.sha }}\`."
